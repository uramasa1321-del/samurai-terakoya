<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="reset.css" />
    <style>
      .button-01 a {
        font-family: "Noto Serif JP", serif;
        font-size: 14px;
        letter-spacing: 0.1em;
        color: #333;
        font-weight: 400;
        border: solid 1px #333;
        display: block;
        box-sizing: border-box;
        max-width: 300px;
        text-align: center;
        padding: 16px 64px;
        margin: 24px;
        margin-inline: auto;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.3s;
      }

      .button-01 a:hover {
        color: #fff;
        background: #333;
        transition: all 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="button-01">
      <a href="#">VIEW MORE</a>
    </div>
  </body>
</html>
