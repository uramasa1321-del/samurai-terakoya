<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CTA タイマー付きランディング</title>
  <style>
    body{
      font-family: sans-serif;
      background:#111;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .meter{
      width:80%;
      max-width:600px;
      height:26px;
      border-radius:13px;
      background:#333;
      overflow:hidden;
      box-shadow:inset 0 0 6px rgba(0,0,0,0.5);
      position:relative;
    }
    .fill{
      height:100%;
      width:0%;
      border-radius:13px;
      background: green;
      transition: width 0.1s linear, background-color 0.3s linear;
    }
    .label{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-weight:bold;
      text-shadow:0 0 6px black;
    }

    /* 残り3秒以下で点滅させる */
    .blink {
      animation: blink 0.6s infinite alternate;
    }
    @keyframes blink {
      from { opacity: 1; }
      to   { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="meter">
    <div class="fill" id="fill"></div>
    <div class="label" id="label">10s</div>
  </div>

<script>
const fill = document.getElementById("fill");
const label = document.getElementById("label");

const duration = 10; // 制限時間（秒）
let start = null;

function lerpColor(a, b, amount) {
  // a,b = [r,g,b]
  const r = a[0] + (b[0] - a[0]) * amount;
  const g = a[1] + (b[1] - a[1]) * amount;
  const bVal = a[2] + (b[2] - a[2]) * amount;
  return `rgb(${r},${g},${bVal})`;
}

function animate(timestamp){
  if(!start) start = timestamp;
  const elapsed = (timestamp - start)/1000;
  const remaining = duration - elapsed;
  const percent = Math.min(1, elapsed/duration);

  // 幅を進める
  fill.style.width = (percent*100)+"%";

  // 色を徐々に変化（緑→黄→赤）
  let color;
  if (percent < 0.5) {
    // 緑 (#22c55e) → 黄 (#facc15)
    const t = percent/0.5;
    color = lerpColor([34,197,94],[250,204,21], t);
  } else {
    // 黄 (#facc15) → 赤 (#ef4444)
    const t = (percent-0.5)/0.5;
    color = lerpColor([250,204,21],[239,68,68], t);
  }
  fill.style.backgroundColor = color;

  // 残り秒数表示
  label.textContent = remaining > 0 ? Math.ceil(remaining) + "s" : "TIME UP!";

  // 残り3秒以下なら点滅クラス付与
  if (remaining <= 3 && remaining > 0) {
    fill.classList.add("blink");
  }

  if(percent < 1){
    requestAnimationFrame(animate);
  } else {
    fill.classList.remove("blink");
    document.body.style.background = "black"; // タイムアウト後の演出
  }
}
requestAnimationFrame(animate);
</script>
</body>
</html>
