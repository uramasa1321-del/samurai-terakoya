<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CTA タイマー付きランディング</title>
    <style>
      :root {
        --duration-sec: 15; /* 制限時間（秒） */
      }
      body {
        font-family: "Noto Sans JP", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1724;
        color: #fff;
        padding: 24px;
      }
      .card {
        max-width: 800px;
        width: 100%;
        background: #111827;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      }
      .headline {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 12px;
      }
      .meter {
        background: #374151;
        border-radius: 12px;
        height: 20px;
        overflow: hidden;
        position: relative;
      }
      .fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        border-radius: 12px;
        transition: width 0.1s linear, background-color 0.3s linear;
      }
      .tick {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        font-weight: 600;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
      }
      .btn {
        background: linear-gradient(90deg, #ef4444, #b91c1c);
        border: 0;
        padding: 10px 16px;
        border-radius: 8px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }
      /* 残り5秒で点滅 */
      .blink {
        animation: blink 0.6s infinite alternate;
      }
      @keyframes blink {
        from {
          opacity: 1;
        }
        to {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="headline">⚠ 早くCTAを押さないとページが閉じられます！</div>
      <div class="meter" id="meter">
        <div class="fill" id="fill"></div>
        <div class="tick" id="tick">--s</div>
      </div>
      <div class="meta">
        <span>残り <span id="remain">--</span> 秒</span>
        <button class="btn" id="ctaBtn">今すぐ申し込む</button>
      </div>
    </div>

    <script>
      const duration = 15; // 秒
      const fill = document.getElementById("fill");
      const tick = document.getElementById("tick");
      const remain = document.getElementById("remain");
      const ctaBtn = document.getElementById("ctaBtn");

      let start = null;
      let finished = false;

      function lerpColor(a, b, t) {
        const r = Math.round(a[0] + (b[0] - a[0]) * t);
        const g = Math.round(a[1] + (b[1] - a[1]) * t);
        const bVal = Math.round(a[2] + (b[2] - a[2]) * t);
        return `rgb(${r},${g},${bVal})`;
      }

      function animate(time) {
        if (!start) start = time;
        const elapsed = (time - start) / 1000;
        const percent = Math.min(1, elapsed / duration);
        const remaining = Math.ceil(duration - elapsed);

        fill.style.width = percent * 100 + "%";
        remain.textContent = remaining > 0 ? remaining : 0;
        tick.textContent = remaining > 0 ? remaining + "s" : "TIME UP!";

        // 色変化 (緑→黄→赤)
        let color;
        if (percent < 0.5) {
          color = lerpColor([34, 197, 94], [250, 204, 21], percent / 0.5); // 緑→黄
        } else {
          color = lerpColor(
            [250, 204, 21],
            [239, 68, 68],
            (percent - 0.5) / 0.5
          ); // 黄→赤
        }
        fill.style.backgroundColor = color;

        // 残り5秒で点滅
        if (remaining <= 5 && remaining > 0) {
          fill.classList.add("blink");
        }

        if (percent < 1) {
          requestAnimationFrame(animate);
        } else if (!finished) {
          finished = true;
          tick.textContent = "TIME UP!";
          // ここでページ遷移やオーバーレイ表示など可能
          document.body.style.background = "black";
        }
      }

      ctaBtn.addEventListener("click", () => {
        finished = true;
        tick.textContent = "CTA済み";
        fill.style.width = "100%";
        fill.classList.remove("blink");
      });

      requestAnimationFrame(animate);
    </script>
  </body>
</html>
